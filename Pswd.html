<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Complexity Checker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Password Complexity Checker</h2>

<input type="password" id="password" placeholder="Enter your password">

<div id="strength"></div>

<ul>
<li id="length">At least 8 characters</li>
<li id="upper">Contains uppercase letter</li>
<li id="lower">Contains lowercase letter</li>
<li id="number">Contains number</li>
<li id="special">Contains special character</li>
</ul>

</div>

<script src="script.js"></script>

</body>
</html>
